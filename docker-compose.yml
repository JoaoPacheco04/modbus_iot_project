# =============================================================
#  Projeto IoT — Modbus + EdgeX + MQTT + InfluxDB
#  Arranque: docker compose up -d
# =============================================================
name: modbus-iot

services:

  modbus-server:
    container_name: modbus-server
    hostname: modbus-server
    build:
      context: .
      dockerfile: Dockerfile.python-app
    command: python modbus-server/server.py
    restart: always
    networks:
      - edgex-network
    environment:
      MODBUS_HOST: "0.0.0.0"
      MODBUS_PORT: "1502"
    ports:
      - "1502:1502"

  # -----------------------------------------------------------
  # BASE EDGEX — obrigatório para tudo funcionar
  # -----------------------------------------------------------
  database:
    container_name: edgex-postgres
    hostname: edgex-postgres
    image: postgres:16.3-alpine3.20
    restart: always
    networks:
      - edgex-network
    environment:
      POSTGRES_DB:       edgex_db
      POSTGRES_PASSWORD: postgres
    volumes:
      - db-data:/var/lib/postgresql/data
      - /etc/localtime:/etc/localtime:ro
    tmpfs:
      - /run

  mqtt-broker:
    container_name: edgex-mqtt-broker
    hostname: edgex-mqtt-broker
    image: eclipse-mosquitto:2.0.21
    restart: always
    networks:
      - edgex-network
    command: /usr/sbin/mosquitto -c /mosquitto-no-auth.conf

  core-keeper:
    container_name: edgex-core-keeper
    hostname: edgex-core-keeper
    image: edgexfoundry/core-keeper:4.0.0
    restart: always
    networks:
      - edgex-network
    environment:
      EDGEX_SECURITY_SECRET_STORE: "false"
      SERVICE_HOST:        edgex-core-keeper
      DATABASE_HOST:       edgex-postgres
      MESSAGEBUS_TYPE:     mqtt
      MESSAGEBUS_HOST:     edgex-mqtt-broker
      MESSAGEBUS_PORT:     "1883"
      MESSAGEBUS_PROTOCOL: tcp
      MESSAGEBUS_AUTHMODE: none
      MESSAGEBUS_SECRETNAME: ""
    ports:
      - "127.0.0.1:59890:59890"
    depends_on:
      - database
      - mqtt-broker
    volumes:
      - /etc/localtime:/etc/localtime:ro

  core-common-config-bootstrapper:
    container_name: edgex-core-common-config-bootstrapper
    hostname: edgex-core-common-config-bootstrapper
    image: edgexfoundry/core-common-config-bootstrapper:4.0.0
    networks:
      - edgex-network
    environment:
      EDGEX_SECURITY_SECRET_STORE:               "false"
      ALL_SERVICES_DATABASE_HOST:                edgex-postgres
      ALL_SERVICES_MESSAGEBUS_HOST:              edgex-mqtt-broker
      ALL_SERVICES_REGISTRY_HOST:                edgex-core-keeper
      APP_SERVICES_CLIENTS_CORE_METADATA_HOST:   edgex-core-metadata
      DEVICE_SERVICES_CLIENTS_CORE_METADATA_HOST: edgex-core-metadata
    command:
      - /core-common-config-bootstrapper
      - --registry
      - -cp=keeper.http://edgex-core-keeper:59890
    depends_on:
      - core-keeper
    volumes:
      - /etc/localtime:/etc/localtime:ro

  core-metadata:
    container_name: edgex-core-metadata
    hostname: edgex-core-metadata
    image: edgexfoundry/core-metadata:4.0.0
    restart: always
    networks:
      - edgex-network
    environment:
      EDGEX_SECURITY_SECRET_STORE: "false"
      SERVICE_HOST: edgex-core-metadata
    command:
      - --registry
      - -cp=keeper.http://edgex-core-keeper:59890
    ports:
      - "127.0.0.1:59881:59881"
    depends_on:
      - core-keeper
      - core-common-config-bootstrapper
      - database
    volumes:
      - /etc/localtime:/etc/localtime:ro

  core-data:
    container_name: edgex-core-data
    hostname: edgex-core-data
    image: edgexfoundry/core-data:4.0.0
    restart: always
    networks:
      - edgex-network
    environment:
      EDGEX_SECURITY_SECRET_STORE: "false"
      SERVICE_HOST: edgex-core-data
    command:
      - --registry
      - -cp=keeper.http://edgex-core-keeper:59890
    ports:
      - "127.0.0.1:59880:59880"
    depends_on:
      - core-keeper
      - core-common-config-bootstrapper
      - database
    volumes:
      - /etc/localtime:/etc/localtime:ro

  core-command:
    container_name: edgex-core-command
    hostname: edgex-core-command
    image: edgexfoundry/core-command:4.0.0
    restart: always
    networks:
      - edgex-network
    environment:
      EDGEX_SECURITY_SECRET_STORE: "false"
      SERVICE_HOST:      edgex-core-command
      EXTERNALMQTT_URL:  tcp://edgex-mqtt-broker:1883
    command:
      - --registry
      - -cp=keeper.http://edgex-core-keeper:59890
    ports:
      - "127.0.0.1:59882:59882"
    depends_on:
      - core-keeper
      - core-common-config-bootstrapper
      - core-metadata
      - database
    volumes:
      - /etc/localtime:/etc/localtime:ro

  # -----------------------------------------------------------
  # PARTE 2 — Device Service Modbus (lê o server.py)
  # -----------------------------------------------------------
  device-modbus:
    container_name: edgex-device-modbus
    hostname: edgex-device-modbus
    image: edgexfoundry/device-modbus:4.0.0
    restart: always
    networks:
      - edgex-network
    environment:
      EDGEX_SECURITY_SECRET_STORE: "false"
      SERVICE_HOST: edgex-device-modbus
      DEVICE_PROFILESDIR: /custom-config/profiles
      DEVICE_DEVICESDIR: /custom-config/devices
    command:
      - --registry
      - -cp=keeper.http://edgex-core-keeper:59890
    volumes:
      - ./mqtt/profiles:/custom-config/profiles
      - ./mqtt/devices:/custom-config/devices
      - /etc/localtime:/etc/localtime:ro
    ports:
      - "127.0.0.1:59901:59901"
    depends_on:
      - core-keeper
      - core-common-config-bootstrapper
      - core-data
      - core-metadata
      - modbus-server

  # -----------------------------------------------------------
  # PARTE 3 — App Service (exporta EdgeX → MQTT externo)
  # -----------------------------------------------------------
  app-service-mqtt-export:
    container_name: edgex-app-service-mqtt-export
    hostname: edgex-app-service-mqtt-export
    image: edgexfoundry/app-service-configurable:4.0.0
    restart: always
    networks:
      - edgex-network
    environment:
      EDGEX_SECURITY_SECRET_STORE: "false"
      EDGEX_PROFILE:   mqtt-export
      SERVICE_HOST:    edgex-app-service-mqtt-export
      # Publica no Mosquitto externo
      WRITABLE_PIPELINE_FUNCTIONS_MQTTEXPORT_PARAMETERS_BROKERADDRESS: "tcp://edgex-mosquitto:1884"
      WRITABLE_PIPELINE_FUNCTIONS_MQTTEXPORT_PARAMETERS_TOPIC: "edgex/factory/sensors"
      WRITABLE_PIPELINE_FUNCTIONS_MQTTEXPORT_PARAMETERS_CLIENTID: "edgex-export"
      WRITABLE_PIPELINE_FUNCTIONS_MQTTEXPORT_PARAMETERS_QOS: "0"
      WRITABLE_PIPELINE_FUNCTIONS_MQTTEXPORT_PARAMETERS_AUTORECONNECT: "true"
    command:
      - --registry
      - -cp=keeper.http://edgex-core-keeper:59890
    depends_on:
      - core-keeper
      - core-common-config-bootstrapper
      - core-data
      - mosquitto
    volumes:
      - /etc/localtime:/etc/localtime:ro

  # -----------------------------------------------------------
  # PARTE 3 — Mosquitto externo (broker MQTT acessível fora)
  # -----------------------------------------------------------
  mosquitto:
    container_name: edgex-mosquitto
    hostname: edgex-mosquitto
    image: eclipse-mosquitto:2.0.21
    restart: always
    networks:
      - edgex-network
    ports:
      - "1884:1884"   # acessível na tua máquina em localhost:1884
    volumes:
      - ./mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf
      - mosquitto-data:/mosquitto/data
      - mosquitto-log:/mosquitto/log

  # -----------------------------------------------------------
  # PARTE 3 — InfluxDB (base de dados de séries temporais)
  # -----------------------------------------------------------
  influxdb:
    container_name: edgex-influxdb
    hostname: edgex-influxdb
    image: influxdb:2.7
    restart: always
    networks:
      - edgex-network
    ports:
      - "8086:8086"   # UI em http://localhost:8086
    environment:
      DOCKER_INFLUXDB_INIT_MODE:         setup
      DOCKER_INFLUXDB_INIT_USERNAME:     admin
      DOCKER_INFLUXDB_INIT_PASSWORD:     password123
      DOCKER_INFLUXDB_INIT_ORG:          edgex-org
      DOCKER_INFLUXDB_INIT_BUCKET:       factory
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN:  edgex-influx-token-2024
    volumes:
      - influxdb-data:/var/lib/influxdb2

  modbus-client:
    container_name: modbus-client
    hostname: modbus-client
    build:
      context: .
      dockerfile: Dockerfile.python-app
    command: python modbus-client/client.py
    restart: always
    networks:
      - edgex-network
    environment:
      MODBUS_HOST: modbus-server
      MODBUS_PORT: "1502"
      MQTT_HOST: edgex-mosquitto
      MQTT_PORT: "1884"
      MQTT_TOPIC: modbus/factory/sensors
      INTERVALO: "5"
    depends_on:
      - modbus-server
      - mosquitto

  # -----------------------------------------------------------
  # PARTE 3 — InfluxDB Export (Script Python)
  # -----------------------------------------------------------
  influxdb-export:
    container_name: influxdb-export
    hostname: influxdb-export
    build:
      context: .
      dockerfile: Dockerfile.python-app
    command: python influx/subscriber.py
    restart: always
    networks:
      - edgex-network
    environment:
      PYTHONUNBUFFERED: "1"
      CONFIG_FILE: /app/influx/configuration.yaml
      MQTT_HOST: edgex-mosquitto
      MQTT_PORT: 1884
      MQTT_TOPIC: modbus/factory/sensors
      INFLUX_URL: "http://edgex-influxdb:8086"
      INFLUX_TOKEN: "edgex-influx-token-2024"
      INFLUX_ORG: "edgex-org"
      INFLUX_BUCKET: "factory"
      INFLUX_MEASUREMENT: "factory_sensors"
    depends_on:
      - mosquitto
      - influxdb

  # -----------------------------------------------------------
  # PARTE 3 — InfluxDB (base de dados de séries temporais)
  # -----------------------------------------------------------


  # -----------------------------------------------------------
  # PARTE 3 — InfluxDB Export (removido, substituído por app-service-influxdb)
  # -----------------------------------------------------------
  # influxdb-export:
  #   container_name: influxdb-export
  #   hostname: influxdb-export
  #   build:
  #     context: .
  #     dockerfile: Dockerfile.python-app
  #   command: python influx/subscriber.py
  #   restart: always
  #   networks:
  #     - edgex-network
  #   environment:
  #     CONFIG_FILE: /app/influx/configuration.yaml
  #   depends_on:
  #     - mosquitto
  #     - influxdb

networks:
  edgex-network:
    name: edgex_edgex-network
    driver: bridge

volumes:
  db-data:
  influxdb-data:
  mosquitto-data:
  mosquitto-log:
  grafana-data:
